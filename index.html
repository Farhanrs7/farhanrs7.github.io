<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MajlisHub - Your Dream Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF7E27;
            --primary-orange-hover: #E66A1F;
            --text-dark: #2D2926;
            --text-muted: #555555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* The new soft rose-mauve to creamy peach background gradient */
            background: linear-gradient(135deg, #D4A5A5 0%, #FADCD2 40%, #FDF3EB 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }

        /* --- NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 5%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 24px;
            color: white; /* Adjusted for contrast against the dark pink top */
        }

        .logo-container img {
            height: 40px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-orange);
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-between;
            padding: 40px 5%;
            gap: 40px;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 24px;
            color: var(--text-dark);
        }

        .hero-content p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--text-muted);
        }

        .highlight {
            color: var(--primary-orange);
            font-weight: 700;
        }

        /* --- BUTTONS --- */
        .store-buttons {
            display: flex;
            gap: 16px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            background-color: var(--primary-orange);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px; /* Pill shape */
            font-weight: 600;
            transition: transform 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 126, 39, 0.3);
        }

        .store-btn:hover {
            background-color: var(--primary-orange-hover);
            transform: translateY(-2px);
        }

        .store-btn img {
            height: 24px;
            margin-right: 12px;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .btn-text span:first-child {
            font-size: 10px;
            font-weight: 400;
            text-transform: uppercase;
        }

        .btn-text span:last-child {
            font-size: 16px;
        }

        /* --- HERO IMAGE --- */
        .hero-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .hero-image-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* --- RESPONSIVE DESIGN FOR MOBILE --- */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 20px;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .store-buttons {
                justify-content: center;
                flex-wrap: wrap;
            }

            .hero-image-wrapper {
                justify-content: center;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="assets/logo.png" alt="MajlisHub Logo">
            <span style="color: #2D2926;">MajlisHub</span>
        </div>
        <nav class="nav-links">
            <a href="#features">Features</a>
            <a href="#download">Download</a>
        </nav>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>Your Dream Wedding,<br>All in One Place.</h1>
            <p>Say goodbye to wedding stress. <span class="highlight">MajlisHub</span> is your ultimate companion to discover top-rated vendors, manage your smart checklist, and plan your big day flawlessly from your phone.</p>
            
            <div class="store-buttons">
                <a href="#" class="store-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Apple_logo_white.svg" alt="Apple Logo">
                    <div class="btn-text">
                        <span>Download on the</span>
                        <span>App Store</span>
                    </div>
                </a>

                <a href="#" class="store-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" alt="Google Play Logo">
                    <div class="btn-text">
                        <span>GET IT ON</span>
                        <span>Google Play</span>
                    </div>
                </a>
            </div>
        </div>

        <div class="hero-image-wrapper">
            <img src="assets/wedding-hero.jpg" alt="Couple celebrating their wedding with balloons">
        </div>
    </main>

</body>
</html>
