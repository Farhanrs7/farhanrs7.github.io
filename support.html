<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | MajlisHub</title>
    <meta name="description" content="Get help and support for MajlisHub.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #FF7E27;
            --primary-orange-hover: #E66A1F;
            --text-dark: #2D2926;
            --text-muted: #555555;
            --bg-light: #FFFFFF;
            --phone-bezel: #F8F9FE; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #D4A5A5 0%, #FADCD2 40%, #FDF3EB 100%);
            color: var(--text-dark);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 5%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
        }

        .logo-container img {
            height: 40px;
            margin-bottom : 14px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .logo-white {
            filter: brightness(0) invert(1);
        }

        .nav-links a:hover {
            color: var(--primary-orange);
        }

        /* --- SUPPORT FORM SECTION --- */
        .support-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 5% 80px;
        }

        .support-card {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .support-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .support-header h1 {
            font-size: 2.2rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .support-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #EBEBEB;
            border-radius: 16px;
            font-size: 1rem;
            color: var(--text-dark);
            background-color: #FAFAFA;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-orange);
            background-color: var(--bg-light);
            box-shadow: 0 0 0 4px rgba(255, 126, 39, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 126, 39, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-orange-hover);
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--bg-light);
            padding: 20px 5% 40px;
            text-align: center;
            border-top-left-radius: 60px;
            border-top-right-radius: 60px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.02);
        }

        .footer-links {
            margin-bottom: 16px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            margin: 0 15px;
        }

        .footer-links a:hover {
            color: var(--primary-orange);
        }

        .footer-copyright {
            color: #999;
            font-size: 0.9rem;
        }

        /* --- POPUP MODAL CSS --- */
        .modal-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateY(30px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h3 {
            color: var(--primary-orange);
            font-size: 1.8rem;
            margin-bottom: 16px;
        }

        .modal-content p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .close-btn {
            background-color: var(--text-dark);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background-color: var(--primary-orange);
        }

        @media (max-width: 600px) {
            .support-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="assets/MajlisHubLogoSVG.svg" alt="MajlisHub Logo" class="logo-white">
            <span>MajlisHub</span>
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main class="support-section">
        <div class="support-card">
            <div class="support-header">
                <h1>How can we help?</h1>
                <p>Send us a message and our team will get back to you.</p>
            </div>

            <form id="support-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="category">What is this regarding?</label>
                    <select id="category" class="form-control" required>
                        <option value="" disabled selected>Select an option...</option>
                        <option value="bug">Report a Bug / Error</option>
                        <option value="feature_request">Feature Suggestion</option>
                        <option value="vendor_inquiry">Vendor Inquiry</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" placeholder="Please describe the issue or your request in detail..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Submit Ticket</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="/privacy">Privacy Policy</a>
            <a href="delete-account.html">Delete Account</a>
        </div>
        <p class="footer-copyright">&copy; 2026 MajlisHub. All rights reserved.</p>
    </footer>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <h3>Ticket Submitted! 🎉</h3>
            <p>Thank you for reaching out. We have received your message and will review it shortly.</p>
            <button class="close-btn" id="close-modal-btn">Back to Home</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
          apiKey: "AIzaSyDEtHh0CYcAF1F3VufD40dg7RxUgwBD07k",
          authDomain: "wedmadegood.firebaseapp.com",
          projectId: "wedmadegood",
          storageBucket: "wedmadegood.firebasestorage.app",
          messagingSenderId: "557493417789",
          appId: "1:557493417789:web:461094e671d0b355aab754"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elements
        const form = document.getElementById('support-form');
        const submitBtn = document.getElementById('submit-btn');
        const modal = document.getElementById('successModal');
        const closeModalBtn = document.getElementById('close-modal-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Submitting...";
        
            const email = document.getElementById('email').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
        
            try {
                // Step 1: Save to your Firestore (for your own database records)
                await addDoc(collection(db, "tickets"), {
                    email: email,
                    category: category,
                    description: description,
                    source: "website",
                    status: "open",
                    createdAt: serverTimestamp()
                });
        
                // Step 2: Push to Make.com (to trigger the GitHub Issue)
                // REPLACE THE URL BELOW WITH YOUR COPIED WEBHOOK URL
                await fetch("https://hook.us1.make.com/YOUR_UNIQUE_CODE_HERE", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: email,
                        category: category,
                        description: description,
                        source: "website"
                    })
                });
        
                modal.classList.add('active');
                form.reset();
                
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Ticket";
            }
        });
        // Modal Close Logic
        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            window.location.href = 'index.html'; // Redirect to home
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
